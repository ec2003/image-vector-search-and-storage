# Nginx Reverse Proxy Configuration
# Variables are substituted by envsubst at container startup via entrypoint.sh
# NGINX_SERVER_NAME: e.g., localhost (dev) or example.com (prod)
# MINIO_SERVER_NAME: e.g., minio.localhost (dev) or minio.example.com (prod)

# HTTP → HTTPS redirect for Django
server {
    listen 80;
    server_name ${NGINX_SERVER_NAME};

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP → HTTPS redirect for MinIO
server {
    listen 80;
    server_name ${MINIO_SERVER_NAME};

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Django (main app + API)
server {
    listen 443 ssl http2;
    server_name ${NGINX_SERVER_NAME};

    # SSL certificates (generated by entrypoint.sh)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Serve Django static files directly (no need to hit Gunicorn)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Django backend
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        client_max_body_size 100M;
    }
}

# HTTPS — MinIO S3 API (object storage, no console)
server {
    listen 443 ssl http2;
    server_name ${MINIO_SERVER_NAME};

    # SSL certificates (generated by entrypoint.sh)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Proxy to MinIO S3 API (port 9000, NOT the Console on 9001)
    location / {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        client_max_body_size 100M;
    }
}