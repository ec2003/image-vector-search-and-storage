services:
  # ──────────────────────────────────────────
  # Nginx Reverse Proxy (with SSL termination)
  # ──────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_PROXY_ENVIRONMENT: ${NGINX_PROXY_ENVIRONMENT:-False}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
      MINIO_SERVER_NAME: ${MINIO_SERVER_NAME:-minio.localhost}
    volumes:
      - static_volume:/app/staticfiles:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - api
      - minio
    restart: unless-stopped

  # ──────────────────────────────────────────
  # PostgreSQL — image metadata database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-image_search}
      POSTGRES_USER: ${POSTGRES_USER:-image_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-image_search_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-image_search} -d ${POSTGRES_DB:-image_search}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Qdrant — vector database for image embeddings
  # ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ──────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    # No external ports — only accessible internally via Docker network
    # (Nginx reverse proxy handles external access for S3 API on port 9000)
    # Console (port 9001) is NOT exposed externally at all
    expose:
      - "9000"   # S3 API (internal only)
      - "9001"   # Console (internal only)
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Create S3 bucket on startup
  # ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET_NAME:-pictures}
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      sleep 3;
      mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin};
      mc mb myminio/${S3_BUCKET_NAME:-pictures} --ignore-existing;
      mc anonymous set public myminio/${S3_BUCKET_NAME:-pictures};
      echo 'Bucket created and set to public!';
      exit 0;
      "

  # ──────────────────────────────────────────
  # Django — serves both API and frontend
  # ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django-api
    # No external ports — only accessible internally via Docker network
    # Nginx reverse proxy handles external access on port 443
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,api}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,https://localhost}
      S3_ENDPOINT_URL: http://minio:9000
      S3_EXTERNAL_ENDPOINT_URL: ${S3_EXTERNAL_ENDPOINT_URL:-}
      NGINX_PROXY_ENVIRONMENT: ${NGINX_PROXY_ENVIRONMENT:-False}
      DEBUG: ${DEBUG:-True}
      USE_SQLITE: "False"
    depends_on:
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - static_volume:/app/src/staticfiles
      - ./src:/app/src
    command: >
      sh -c "
        python manage.py makemigrations &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput 2>/dev/null || true &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --reload
      "
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
  qdrant_data:
  static_volume:
  nginx_ssl: